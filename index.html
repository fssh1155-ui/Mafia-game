<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المافيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --primary-red: #c90000;
            --dark-red: #7a0000;
            --text-light: #f5f5f5;
            --panel-bg: #1a1a1a;
            --gold: #d4af37;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: var(--bg-color); color: var(--text-light);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background-image: radial-gradient(circle at center, #1a0000 0%, #0a0a0a 100%);
        }

        .container {
            background-color: var(--panel-bg); width: 95%; max-width: 600px;
            padding: 30px; border-radius: 15px; box-shadow: 0 0 30px rgba(201, 0, 0, 0.3);
            border: 1px solid #330000; text-align: center; position: relative;
        }

        /* زر القائمة */
        .menu-btn {
            position: absolute; top: 15px; left: 15px; background: #222;
            color: #fff; border: 1px solid #444; padding: 8px 15px;
            border-radius: 5px; cursor: pointer; transition: 0.3s;
            z-index: 10; font-weight: bold;
        }
        .menu-btn:hover { background: var(--primary-red); border-color: var(--primary-red); }

        h1 { color: var(--primary-red); font-weight: 900; font-size: 2.5rem; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .screen { display: none; animation: fadeIn 0.5s; }
        .screen.active { display: block; }

        input[type="text"] {
            width: 100%; padding: 15px; margin: 10px 0; background-color: #000;
            border: 1px solid var(--dark-red); color: white; border-radius: 8px;
            font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary-red); box-shadow: 0 0 10px rgba(201, 0, 0, 0.5); }

        button.main-btn {
            width: 100%; padding: 15px; margin: 10px 0; background-color: var(--dark-red);
            color: white; border: none; border-radius: 8px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button.main-btn:hover:not(:disabled) { background-color: var(--primary-red); transform: scale(1.02); }
        button.main-btn:disabled { background-color: #333; color: #888; cursor: not-allowed; transform: none; }
        
        button.btn-danger { background-color: #990000; border: 1px solid #ff3333; }
        button.btn-danger:hover { background-color: #ff0000; }
        button.btn-secondary { background-color: #444; }

        .player-list, .voting-list { list-style: none; margin: 20px 0; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: right; }
        .player-list li, .voting-list li { padding: 10px; border-bottom: 1px solid #333; font-size: 1.1rem; }
        
        .role-card {
            padding: 30px; border-radius: 10px; margin: 20px 0; font-size: 1.8rem;
            font-weight: bold; border: 2px solid var(--primary-red);
            background-size: cover; background-position: center; position: relative;
            color: white; text-shadow: 2px 2px 4px #000; min-height: 150px;
            display: flex; align-items: center; justify-content: center;
        }
        .role-card::after { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); border-radius: 8px; z-index: 1; }
        .role-card span { position: relative; z-index: 2; }

        .timer-display { font-size: 3rem; font-weight: bold; color: var(--gold); margin: 20px 0; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        
        .voting-list input[type="radio"] { display: none; }
        .voting-list label {
            display: block; background-color: #111; border: 2px solid #444; color: white;
            padding: 15px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .voting-list input[type="radio"]:checked + label {
            border-color: var(--primary-red); background-color: rgba(201, 0, 0, 0.2); transform: scale(1.02);
        }

        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background-color: var(--primary-red); color: white; padding: 15px 25px; border-radius: 8px; font-weight: bold; z-index: 9999; opacity: 0; visibility: hidden; transition: 0.3s; text-align: center; }
        .notification.show { opacity: 1; visibility: visible; top: 40px; }

        .hidden { display: none !important; }
        .teammates-box { background: rgba(200,0,0,0.1); border: 1px solid var(--primary-red); padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 1rem; color: #ff9999;}
        
        /* تصميم قائمة التحكم (Modal) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 3000;
            display: flex; justify-content: center; align-items: center;
        }
        .modal-box {
            background: var(--panel-bg); padding: 30px; border-radius: 12px;
            width: 90%; max-width: 400px; border: 1px solid var(--primary-red);
            text-align: center;
        }
        .modal-box h2 { margin-bottom: 20px; color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="sound-night" src="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg" preload="auto"></audio>
    <audio id="sound-day" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>
    <audio id="sound-gun" src="https://actions.google.com/sounds/v1/weapons/gun_firing_and_reloading.ogg" preload="auto"></audio>

    <div id="game-notification" class="notification"></div>

    <div id="menuModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2>⚙️ قائمة التحكم</h2>
            
            <div id="hostMenuOptions" class="hidden">
                <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 10px;">خيارات المضيف:</p>
                <button class="main-btn" onclick="hostReturnToLobby()">إعادة الجميع لغرفة الانتظار 🔄</button>
                <button class="main-btn btn-danger" onclick="hostCancelGame()">إلغاء الغرفة وإنهاء اللعبة ❌</button>
            </div>
            
            <div id="playerMenuOptions" class="hidden">
                <button class="main-btn btn-danger" onclick="playerLeaveGame()">الخروج من اللعبة 🚪</button>
            </div>
            
            <button class="main-btn btn-secondary" style="margin-top: 20px;" onclick="closeMenu()">إغلاق القائمة</button>
        </div>
    </div>

    <div class="container">
        <button class="menu-btn hidden" id="menuBtn" onclick="openMenu()">⚙️ القائمة</button>

        <div id="login-screen" class="screen active">
            <h1>المافيا</h1>
            <p>المدينة لا تنام...</p>
            <input type="text" id="playerName" placeholder="أدخل اسمك هنا..." autocomplete="off">
            <button class="main-btn" onclick="createRoom()">إنشاء غرفة (كـ مضيف)</button>
            <div style="margin: 15px 0; color: #666;">أو</div>
            <input type="text" id="roomCode" placeholder="رمز الغرفة" autocomplete="off">
            <button class="main-btn" onclick="joinRoom()">الانضمام لغرفة</button>
        </div>

        <div id="lobby-screen" class="screen">
            <h1>غرفة الانتظار</h1>
            <p>رمز الغرفة: <strong id="displayRoomCode" style="color: var(--primary-red); font-size: 1.5rem;">---</strong></p>
            <div style="margin-top: 15px; color: #aaa;">اللاعبين: <span id="playerCount">0</span></div>
            <ul class="player-list" id="playersList"></ul>
            
            <button class="main-btn hidden" id="btnStartGame" onclick="startGame()">بدء اللعبة وتوزيع الأدوار</button>
            <p id="waitingHostMsg" style="color: #aaa;">بانتظار المضيف لبدء اللعبة...</p>
        </div>

        <div id="game-screen" class="screen">
            <h1 id="gamePhaseTitle">...</h1>
            <div id="gameTimer" class="timer-display hidden">00:00</div>
            
            <div class="role-card" id="playerRoleCard" style="background-image: url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&w=800&q=80');">
                <span id="playerRoleText">جاري جلب الدور...</span>
            </div>

            <div id="teammatesBox" class="teammates-box hidden"></div>
            
            <div id="actionArea" class="hidden">
                <p id="actionPrompt" style="margin: 15px 0; font-size: 1.2rem;">اختر هدفك:</p>
                <ul class="voting-list" id="targetList"></ul>
                <button class="main-btn" id="btnSubmitAction" onclick="submitAction()">تأكيد الاختيار</button>
            </div>

            <button class="main-btn hidden" id="btnReadyForVote" onclick="markReady()">أنا جاهز للتصويت ✋</button>
            
            <div id="hostControls" class="hidden" style="margin-top: 30px; border-top: 1px solid #333; padding-top: 15px;">
                <p style="color: #666; font-size: 0.9rem; margin-bottom: 10px;">أدوات المضيف (لتسريع اللعب):</p>
                <button class="main-btn" style="background: #444;" onclick="hostAdvancePhase()">تخطي للمرحلة التالية ⏭️</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // إعدادات فايربيس (تأكد من تركها كما هي الخاصة بك)
        const firebaseConfig = {
            apiKey: "AIzaSyCiEe9aZ9nyUfGpxSwdsNPoVS5gi670emw",
            authDomain: "mafia-game-new.firebaseapp.com",
            databaseURL: "https://mafia-game-new-default-rtdb.firebaseio.com",
            projectId: "mafia-game-new",
            storageBucket: "mafia-game-new.firebasestorage.app",
            messagingSenderId: "92136774152",
            appId: "1:92136774152:web:c5f26e32998334ec8bcfbd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRoom = "", myName = "", myRole = "", isHost = false;
        let gameState = "", currentRound = 1, docLastProtected = "";
        let timerInterval;

        const rolesList = ["مافيا 🔪", "مساعد مافيا 🦹‍♂️", "طبيب 💉", "شايب 👴🏼", "مواطن 👤", "مواطن 👤", "مواطن 👤", "مواطن 👤"];
        
        const roleImages = {
            "مافيا 🔪": "https://images.unsplash.com/photo-1595982855117-09d3ee321528?auto=format&fit=crop&w=800&q=80",
            "مساعد مافيا 🦹‍♂️": "https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?auto=format&fit=crop&w=800&q=80",
            "طبيب 💉": "https://images.unsplash.com/photo-1584362917165-526a968579e8?auto=format&fit=crop&w=800&q=80",
            "شايب 👴🏼": "https://images.unsplash.com/photo-1552308995-2baac1ad5490?auto=format&fit=crop&w=800&q=80",
            "مواطن 👤": "https://images.unsplash.com/photo-1517673400267-0251440c45dc?auto=format&fit=crop&w=800&q=80"
        };

        // --- نظام حفظ الجلسة ---
        window.onload = () => {
            let sRoom = sessionStorage.getItem('mafia_room');
            let sName = sessionStorage.getItem('mafia_name');
            let sHost = sessionStorage.getItem('mafia_host');
            
            if(sRoom && sName) {
                currentRoom = sRoom;
                myName = sName;
                isHost = (sHost === 'true');
                
                document.getElementById('displayRoomCode').innerText = currentRoom;
                document.getElementById('menuBtn').classList.remove('hidden');
                
                if(isHost) {
                    document.getElementById('btnStartGame').classList.remove('hidden');
                    document.getElementById('waitingHostMsg').classList.add('hidden');
                    document.getElementById('hostControls').classList.remove('hidden');
                }
                
                listenToRoom(); // سيتولى توجيه اللاعب للشاشة الصحيحة بناءً على حالة القاعدة
            }
        };

        function saveSession() {
            sessionStorage.setItem('mafia_room', currentRoom);
            sessionStorage.setItem('mafia_name', myName);
            sessionStorage.setItem('mafia_host', isHost);
        }

        function clearSessionAndReload() {
            sessionStorage.clear();
            window.location.reload();
        }

        // --- أدوات القائمة ---
        function openMenu() {
            document.getElementById('menuModal').classList.remove('hidden');
            if(isHost) {
                document.getElementById('hostMenuOptions').classList.remove('hidden');
                document.getElementById('playerMenuOptions').classList.add('hidden');
            } else {
                document.getElementById('hostMenuOptions').classList.add('hidden');
                document.getElementById('playerMenuOptions').classList.remove('hidden');
            }
        }
        
        function closeMenu() {
            document.getElementById('menuModal').classList.add('hidden');
        }

        function hostCancelGame() {
            if(confirm("هل أنت متأكد من إلغاء الغرفة؟ سيتم طرد جميع اللاعبين.")) {
                db.ref(`rooms/${currentRoom}`).remove().then(() => clearSessionAndReload());
            }
        }

        function hostReturnToLobby() {
            if(confirm("هل تريد إنهاء اللعبة الحالية وإعادة الجميع لغرفة الانتظار؟")) {
                db.ref(`rooms/${currentRoom}/players`).once('value', snap => {
                    let updates = {};
                    snap.forEach(c => {
                        updates[`rooms/${currentRoom}/players/${c.key}/role`] = "waiting";
                        updates[`rooms/${currentRoom}/players/${c.key}/isAlive`] = true;
                    });
                    updates[`rooms/${currentRoom}/state`] = 'lobby';
                    updates[`rooms/${currentRoom}/round`] = 1;
                    updates[`rooms/${currentRoom}/nightActions`] = null;
                    updates[`rooms/${currentRoom}/votes`] = null;
                    updates[`rooms/${currentRoom}/readyPlayers`] = null;
                    
                    db.ref().update(updates);
                });
                closeMenu();
            }
        }

        function playerLeaveGame() {
            if(confirm("هل تريد الخروج من اللعبة؟")) {
                db.ref(`rooms/${currentRoom}/players/${myName}`).remove().then(() => clearSessionAndReload());
            }
        }

        // --- الأساسيات ---
        function showNotification(msg) {
            const el = document.getElementById('game-notification');
            el.innerText = msg; el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3500);
        }
        
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function playSound(id) {
            const audio = document.getElementById(id);
            if(audio) { audio.currentTime = 0; audio.play().catch(e=>console.log("الصوت مقفل")); }
        }

        function sanitizeName(name) {
            // منع الرموز التي تسبب مشاكل في مفاتيح فايربيس
            return name.trim().replace(/[.#$\[\]\/]/g, "");
        }

        function createRoom() {
            let rawName = document.getElementById('playerName').value;
            myName = sanitizeName(rawName);
            
            if (!myName) return showNotification("الرجاء إدخال اسم صحيح بدون رموز غريبة");
            
            currentRoom = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;
            
            db.ref(`rooms/${currentRoom}`).set({
                host: myName, state: 'lobby', round: 1, timerEnd: 0,
                players: { [myName]: { name: myName, role: "waiting", isAlive: true } }
            }).then(() => {
                saveSession();
                document.getElementById('displayRoomCode').innerText = currentRoom;
                document.getElementById('btnStartGame').classList.remove('hidden');
                document.getElementById('waitingHostMsg').classList.add('hidden');
                document.getElementById('hostControls').classList.remove('hidden');
                document.getElementById('menuBtn').classList.remove('hidden');
                
                showScreen('lobby-screen'); 
                listenToRoom();
            }).catch(error => {
                showNotification("حدث خطأ أثناء الإنشاء، تأكد من اتصالك.");
            });
        }

        function joinRoom() {
            let rawName = document.getElementById('playerName').value;
            myName = sanitizeName(rawName);
            currentRoom = document.getElementById('roomCode').value.trim();
            
            if (!myName || !currentRoom) return showNotification("أدخل بياناتك كاملة");

            db.ref(`rooms/${currentRoom}`).once('value').then(snap => {
                if(snap.exists() && snap.val().state === 'lobby') {
                    db.ref(`rooms/${currentRoom}/players/${myName}`).set({ name: myName, role: "waiting", isAlive: true }).then(() => {
                        saveSession();
                        document.getElementById('displayRoomCode').innerText = currentRoom;
                        document.getElementById('menuBtn').classList.remove('hidden');
                        
                        showScreen('lobby-screen'); 
                        listenToRoom();
                    });
                } else showNotification("الغرفة غير موجودة أو اللعبة بدأت بالفعل");
            });
        }

        function listenToRoom() {
            // مستمع للاعبين
            db.ref(`rooms/${currentRoom}/players`).on('value', snap => {
                const list = document.getElementById('playersList'); list.innerHTML = "";
                let count = 0;
                snap.forEach(child => {
                    const p = child.val(); count++;
                    const status = p.isAlive ? "🟢" : "💀";
                    list.innerHTML += `<li>${p.name} ${status} ${p.name === myName ? "<span>(أنت)</span>" : ""}</li>`;
                    if(p.name === myName && p.role !== "waiting") updateMyRoleUI(p.role);
                });
                document.getElementById('playerCount').innerText = count;
            });

            // مستمع لحالة الغرفة (هنا يتم اصطياد إلغاء الغرفة)
            db.ref(`rooms/${currentRoom}`).on('value', snap => {
                const roomData = snap.val();
                
                // إذا تم حذف الغرفة (بواسطة المضيف)
                if(!roomData) {
                    alert("تم إلغاء الغرفة أو إنهاء اللعبة من قبل المضيف.");
                    clearSessionAndReload();
                    return;
                }
                
                currentRound = roomData.round || 1;
                
                if(roomData.state !== gameState) {
                    gameState = roomData.state;
                    
                    if (gameState === 'lobby') {
                        showScreen('lobby-screen');
                        document.getElementById('gamePhaseTitle').innerText = "...";
                        document.getElementById('playerRoleText').innerText = "بانتظار توزيع الأدوار...";
                        document.getElementById('playerRoleCard').style.backgroundImage = "url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&w=800&q=80')";
                        myRole = "waiting"; // تفريغ الدور القديم
                    } else {
                        handleStateChange(roomData);
                    }
                }
            });
        }

        function updateMyRoleUI(role) {
            myRole = role;
            document.getElementById('playerRoleText').innerText = "دورك: " + role;
            if(roleImages[role]) document.getElementById('playerRoleCard').style.backgroundImage = `url('${roleImages[role]}')`;
        }

        function startGame() {
            db.ref(`rooms/${currentRoom}/players`).once('value', snap => {
                let players = []; 
                snap.forEach(c => players.push(c.val().name));
                
                // التحقق الصارم من عدد اللاعبين
                if(players.length < 3) {
                    showNotification(`العدد الحالي: ${players.length}. نحتاج 3 لاعبين كحد أدنى للبدء!`);
                    return;
                }
                
                players.sort(() => Math.random() - 0.5); 
                let updates = {};
                players.forEach((p, i) => {
                    updates[`rooms/${currentRoom}/players/${p}/role`] = rolesList[i] || "مواطن 👤";
                    updates[`rooms/${currentRoom}/players/${p}/isAlive`] = true;
                });
                updates[`rooms/${currentRoom}/state`] = 'night';
                updates[`rooms/${currentRoom}/round`] = 1;
                db.ref().update(updates);
            });
        }

        function handleStateChange(data) {
            showScreen('game-screen');
            clearInterval(timerInterval);
            hideAllGameUI();

            const me = data.players[myName];
            // إذا كنت غير موجود في قائمة اللاعبين (تم طردك مثلاً)
            if(!me) {
                clearSessionAndReload();
                return;
            }

            if(!me.isAlive) {
                document.getElementById('gamePhaseTitle').innerText = "أنت ميت 💀، راقب بصمت";
                return;
            }

            if(gameState === 'night') {
                playSound('sound-night');
                document.getElementById('gamePhaseTitle').innerText = "الليل يخيم على المدينة 🌙";
                setupNightActions(data.players);

            } else if(gameState === 'discussion') {
                playSound('sound-day');
                document.getElementById('gamePhaseTitle').innerText = "مرحلة النقاش ☀️";
                
                const btnReady = document.getElementById('btnReadyForVote');
                btnReady.classList.remove('hidden');
                btnReady.disabled = false;
                btnReady.innerText = "أنا جاهز للتصويت ✋";
                
                startTimer(data.timerEnd, () => { if(isHost) hostSetState('voting', 60); });

            } else if(gameState === 'voting') {
                document.getElementById('gamePhaseTitle').innerText = "وقت التصويت ⚖️";
                setupVotingActions(data.players);
                startTimer(data.timerEnd, () => { if(isHost) processVotes(); });
            }
        }

        function hideAllGameUI() {
            document.getElementById('actionArea').classList.add('hidden');
            document.getElementById('btnReadyForVote').classList.add('hidden');
            document.getElementById('gameTimer').classList.add('hidden');
            document.getElementById('teammatesBox').classList.add('hidden');
        }

        function setupNightActions(players) {
            const targetList = document.getElementById('targetList');
            targetList.innerHTML = "";
            let canAct = false;
            let promptText = "";

            if(myRole.includes("مافيا")) {
                let mafias = Object.values(players).filter(p => p.role.includes("مافيا")).map(p=>p.name).join(' و ');
                document.getElementById('teammatesBox').innerText = "فريق المافيا: " + mafias;
                document.getElementById('teammatesBox').classList.remove('hidden');
            }

            Object.values(players).forEach(p => {
                if(!p.isAlive) return;

                if(myRole === "مافيا 🔪" && !p.role.includes("مافيا")) {
                    canAct = true; promptText = "اختر ضحيتك:";
                    addTargetRadio(p.name);
                } 
                else if(myRole === "طبيب 💉") {
                    let isSelf = (p.name === myName);
                    let canProtect = true;
                    if(isSelf && currentRound === 1) canProtect = false;
                    if(isSelf && docLastProtected === myName) canProtect = false; 
                    
                    if(canProtect) {
                        canAct = true; promptText = "اختر من تحمي:";
                        addTargetRadio(p.name, isSelf ? " (أنت)" : "");
                    }
                }
                else if(myRole === "شايب 👴🏼" && p.name !== myName) {
                    canAct = true; promptText = "اختر شخصاً لتتحرى عنه:";
                    addTargetRadio(p.name);
                }
            });

            if(canAct) {
                document.getElementById('actionPrompt').innerText = promptText;
                document.getElementById('actionArea').classList.remove('hidden');
            } else {
                document.getElementById('gamePhaseTitle').innerText += "\nاخلد للنوم...";
            }
        }

        function addTargetRadio(name, extra = "") {
            document.getElementById('targetList').innerHTML += `
                <li><input type="radio" name="target" id="t_${name}" value="${name}"><label for="t_${name}">${name}${extra}</label></li>
            `;
        }

        function submitAction() {
            const selected = document.querySelector('input[name="target"]:checked');
            if(!selected) return showNotification("اختر شخصاً أولاً");
            
            const target = selected.value;

            if(gameState === 'voting') {
                db.ref(`rooms/${currentRoom}/votes/${myName}`).set(target);
                showNotification("تم تسجيل تصويتك: " + (target === 'skip' ? 'تخطي' : target));
                return;
            }

            let actionType = "";
            if(myRole === "مافيا 🔪") actionType = "kill";
            if(myRole === "طبيب 💉") { actionType = "protect"; docLastProtected = target; }
            
            if(myRole === "شايب 👴🏼") {
                db.ref(`rooms/${currentRoom}/players/${target}/role`).once('value', snap => {
                    showNotification(`🔍 اكتشفت أن ${target} هو: ${snap.val()}`);
                    document.getElementById('actionArea').classList.add('hidden');
                });
            } else {
                db.ref(`rooms/${currentRoom}/nightActions/${actionType}`).set(target);
                showNotification("تم تأكيد اختيارك");
                document.getElementById('actionArea').classList.add('hidden');
            }
        }

        function markReady() {
            db.ref(`rooms/${currentRoom}/readyPlayers/${myName}`).set(true);
            const btnReady = document.getElementById('btnReadyForVote');
            btnReady.disabled = true;
            btnReady.innerText = "تم التأكيد، بانتظار البقية...";
            
            if(isHost) {
                db.ref(`rooms/${currentRoom}`).once('value', snap => {
                    let d = snap.val();
                    let aliveCount = Object.values(d.players).filter(p=>p.isAlive).length;
                    let readyCount = d.readyPlayers ? Object.keys(d.readyPlayers).length : 0;
                    if(readyCount >= aliveCount) hostSetState('voting', 60);
                });
            }
        }

        function setupVotingActions(players) {
            const targetList = document.getElementById('targetList');
            targetList.innerHTML = `<li><input type="radio" name="target" id="v_skip" value="skip" checked><label for="v_skip">تخطي التصويت (Skip)</label></li>`;
            
            Object.values(players).forEach(p => {
                if(p.isAlive && p.name !== myName) {
                    targetList.innerHTML += `<li><input type="radio" name="target" id="v_${p.name}" value="${p.name}"><label for="v_${p.name}">${p.name}</label></li>`;
                }
            });
            document.getElementById('actionPrompt').innerText = "اختر من تريد إعدامه:";
            document.getElementById('actionArea').classList.remove('hidden');
        }

        function startTimer(endTimeStr, onComplete) {
            const el = document.getElementById('gameTimer');
            el.classList.remove('hidden');
            const endTime = new Date(endTimeStr).getTime();

            timerInterval = setInterval(() => {
                let now = new Date().getTime();
                let distance = endTime - now;
                if(distance <= 0) {
                    clearInterval(timerInterval); el.innerText = "00:00";
                    if(onComplete) onComplete();
                } else {
                    let m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    let s = Math.floor((distance % (1000 * 60)) / 1000);
                    el.innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
                }
            }, 1000);
        }

        function hostSetState(newState, seconds) {
            let endTime = new Date(new Date().getTime() + seconds * 1000).toISOString();
            let updates = { state: newState, timerEnd: endTime, readyPlayers: null };
            if(newState === 'night') updates.round = currentRound + 1;
            db.ref(`rooms/${currentRoom}`).update(updates);
        }

        function hostAdvancePhase() {
            if(gameState === 'night') processNightResults();
            else if(gameState === 'discussion') hostSetState('voting', 60);
            else if(gameState === 'voting') processVotes();
        }

        function processNightResults() {
            db.ref(`rooms/${currentRoom}`).once('value', snap => {
                let d = snap.val();
                let actions = d.nightActions || {};
                let kill = actions.kill; let protect = actions.protect;
                
                db.ref(`rooms/${currentRoom}/nightActions`).remove();

                if(kill && kill !== protect) {
                    playSound('sound-gun');
                    db.ref(`rooms/${currentRoom}/players/${kill}/isAlive`).set(false);
                }
                hostSetState('discussion', 210);
            });
        }

        function processVotes() {
            db.ref(`rooms/${currentRoom}`).once('value', snap => {
                let d = snap.val();
                let votes = d.votes || {};
                db.ref(`rooms/${currentRoom}/votes`).remove(); 
                
                let counts = {}; let maxVotes = 0; let victim = null;
                Object.values(votes).forEach(v => {
                    if(v !== 'skip') {
                        counts[v] = (counts[v] || 0) + 1;
                        if(counts[v] > maxVotes) { maxVotes = counts[v]; victim = v; }
                    }
                });

                if(victim) {
                    playSound('sound-gun');
                    db.ref(`rooms/${currentRoom}/players/${victim}/isAlive`).set(false);
                }
                hostSetState('night', 0); 
            });
        }
    </script>
</body>
</html>
