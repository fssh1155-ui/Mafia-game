<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة المافيا الاحترافية</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #e74c3c; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #c0392b; }
        .hidden { display: none; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>لعبة المافيا</h1>
        
        <div id="login-screen">
            <input type="text" id="playerName" placeholder="أدخل اسمك الكريم">
            <br>
            <button id="btnCreate">إنشاء غرفة جديدة</button>
        </div>

        <div id="lobby-screen" class="hidden">
            <h2>أهلاً بك في الغرفة</h2>
            <p>رمز الغرفة: <span id="displayCode" style="color: #f1c40f; font-size: 24px;"></span></p>
            <button onclick="location.reload()">مغادرة الغرفة</button>
        </div>

        <p id="status"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCiEe9aZ9nyUfGpxSwdsNPoVS5gi670emw",
            authDomain: "mafia-game-new.firebaseapp.com",
            databaseURL: "https://mafia-game-new-default-rtdb.firebaseio.com",
            projectId: "mafia-game-new",
            storageBucket: "mafia-game-new.firebasestorage.app",
            messagingSenderId: "92136774152",
            appId: "1:92136774152:web:c5f26e32998334ec8bcfbd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const btnCreate = document.getElementById('btnCreate');
        const loginScreen = document.getElementById('login-screen');
        const lobbyScreen = document.getElementById('lobby-screen');
        const status = document.getElementById('status');

        btnCreate.onclick = () => {
            const name = document.getElementById('playerName').value;
            if(!name) return alert("يرجى كتابة اسمك!");

            const roomCode = Math.floor(1000 + Math.random() * 9000);
            status.innerText = "جاري إنشاء الغرفة...";

            db.ref('rooms/' + roomCode).set({
                host: name,
                status: 'waiting'
            }).then(() => {
                loginScreen.classList.add('hidden');
                lobbyScreen.classList.remove('hidden');
                document.getElementById('displayCode').innerText = roomCode;
                status.innerText = "✅ تم إنشاء الغرفة بنجاح!";
            }).catch(err => {
                status.innerText = "خطأ: " + err.message;
            });
        };
    </script>
</body>
</html>
